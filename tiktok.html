<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open TikTok</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 40px;
      background: linear-gradient(135deg, #ff0050, #ff0050 40%, #00f2ea);
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 0 30px rgba(255, 0, 80, 0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 50px rgba(255, 0, 80, 0.8);
    }

    .btn svg {
      width: 28px;
      height: 28px;
      fill: #fff;
    }
  </style>
</head>
<body>

  <a class="btn" href="https://vt.tiktok.com/ZS98DqyyP8uox-CSlM3/" target="_blank" rel="noopener noreferrer">
    <!-- TikTok logo -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/>
    </svg>
    Open TikTok
  </a>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Suspended</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        supabase: {
                            green: '#3ECF8E',
                            greenHover: '#24B47E',
                            dark: '#1C1C1C',
                            darker: '#181818',
                            border: '#2E2E2E',
                            textBase: '#EDEDED',
                            textMuted: '#A1A1AA'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-supabase-darker min-h-screen flex items-center justify-center p-4 antialiased text-supabase-textBase">

    <div class="bg-supabase-dark border border-supabase-border rounded-xl shadow-2xl max-w-md w-full p-8 relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-600 to-red-400"></div>

        <div class="flex flex-col items-center text-center">
            
            <div class="bg-red-500/10 p-3 rounded-full mb-5 border border-red-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>

            <h1 class="text-2xl font-semibold mb-2 tracking-tight">Project Suspended</h1>
            <p class="text-supabase-textMuted text-sm leading-relaxed mb-6">
                This project has been temporarily paused due to a violation of our Terms of Service. Database and API access are currently restricted.
            </p>

            <div class="w-full bg-black/20 border border-supabase-border rounded-lg p-4 mb-8 text-left">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-medium text-supabase-textMuted uppercase tracking-wider">Project Ref</span>
                    <span id="project-ref" class="text-xs font-mono text-supabase-textBase bg-white/5 px-2 py-1 rounded">generating...</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs font-medium text-supabase-textMuted uppercase tracking-wider">Status</span>
                    <span class="flex items-center text-xs font-medium text-red-400 bg-red-400/10 px-2 py-1 rounded">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500 mr-1.5 animate-pulse"></span>
                        Suspended
                    </span>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 w-full">
                <a href="https://supabase.com/support" target="_blank" rel="noopener noreferrer" class="flex-1 bg-supabase-green hover:bg-supabase-greenHover text-black font-medium text-sm py-2.5 px-4 rounded-md transition-colors duration-200 flex justify-center items-center">
                    Contact Support
                </a>
                
                <a href="https://supabase.com/terms" target="_blank" rel="noopener noreferrer" class="flex-1 bg-transparent hover:bg-white/5 border border-supabase-border text-supabase-textBase font-medium text-sm py-2.5 px-4 rounded-md transition-colors duration-200 flex justify-center items-center">
                    Read Terms
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Supabase project refs are typically 20 random lowercase characters
            const generateRef = () => {
                const chars = 'abcdefghijklmnopqrstuvwxyz';
                let result = '';
                for (let i = 0; i < 20; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            };

            // Set the generated string to the element
            document.getElementById('project-ref').textContent = generateRef();
        });
    </script>
</body>
</html>
